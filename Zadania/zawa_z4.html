<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zadanie 4</title>
<style>
body{
    font-family: Arial;
}

table{
    border-collapse: collapse;
    width: 80%;
    margin-bottom: 15px;
}

td{
    border: 2px solid black;
    padding: 10px;
}

textarea{
    width: 100%;
    height: 70px;
}
</style>
</head>

<body>

<h1>Temat: Sposoby podłączania CSS do kodu strony WWW</h1>

<table>
<tr>
<td>
<b><u>1. Styl liniowy (Inline CSS)</u></b><br><br>
<textarea readonly>
<p style="color:red;">Przykładowy tekst</p>
</textarea>
</td>
</tr>
</table>

<table>
<tr>
<td>
<b><u>2. Styl wewnętrzny (Internal CSS)</u></b><br><br>
<textarea readonly>
<style>
p{
color:red;
}
</style>
</textarea>
</td>
</tr>
</table>

<table>
<tr>
<td>
<b><u>3. Styl zewnętrzny (External CSS)</u></b><br><br>
<textarea readonly>
<link rel="stylesheet" href="style.css">
</textarea>
</td>
</tr>
</table>

<table>
<tr>
<td>
<b><u>4. Import arkusza CSS</u></b><br><br>
<textarea readonly>
<style>
@import url("style.css");
</style>
</textarea>
</td>
</tr>
</table>

<table>
<tr>
<td>
<b><u>5. Arkusz stylów dla różnych mediów</u></b><br><br>
<textarea readonly>
<link rel="stylesheet" href="druk.css" media="print">
</textarea>
</td>
</tr>
</table>

</body>
</html>
