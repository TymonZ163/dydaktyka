        <p id="pogrubienie_zawadzki">Zawadzki<br>
            Programista wchodzi do sklepu i mówi: "Poproszę 2 chleby."
            Sprzedawca: "A może 3?" Programista: "Nie, sprawdziłem — potrzebuję dokładnie 2. Warunek IF był false."
        </p>

        <p id="pochylona_zawadzki">Zawadzki<br>
            Dlaczego programiści mylą Halloween z Bożym Narodzeniem?
            Bo OCT 31 = DEC 25.
        </p>

        <p id="index_gorny_zawadzki">Zawadzki<br>
            Szef pyta programistę: "Ile czasu zajmie ci to zadanie?"
            Programista: "Trzy dni." Szef: "A jeśli dodam drugiego programistę?"
            Programista: "Sześć dni."
        </p>

        <p id="index_dolny_zawadzki">Zawadzki<br>
            Żona mówi do programisty: "Idź do sklepu, kup bochenek chleba,
            a jak będą jajka — kup dziesięć." Programista wraca z dziesięcioma bochenkami chleba.
            "Były jajka."
        </p>

        <p id="mono_zawadzki">Zawadzki<br>
            Jak nazywa się komputer bez pamięci RAM?
            Bezpamiętnik.
        </p>

        <p id="powiekszenie_zawadzki">Zawadzki<br>
            Programista nie wychodzi z domu, bo przeczytał na butelce szamponu:
            "Nałóż, spłucz, powtórz." I tak kręci się w kółko od trzech dni.
        </p>

        <p id="pomniejszenie_zawadzki">Zawadzki<br>
            Dlaczego programiści noszą okulary?
            Bo nie mogą C# (C-sharp = see sharp = widzieć ostro).
        </p>
