<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Kod HTML: </h1>
        <textarea cols="100" rows="33">
            <!DOCTYPE html>
            <html lang="pl">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <style> 
                    @import url("zawa_z20.css"); 
                </style> 
            </head>
            <body>
                <div id="jeden">
                    <p>P jest kolorem pomarańczowym</p>
                    <P>wielkością 20 punktów</P>
                    <P>i czcionką Arial</p>
                </div>

                <div id="dwa">
                    <b><i>I jest pogrubione</i></b>
                    <strike>Strike jest przekreślone(Wpisz swój tekst)</strike>
                    <u>U ma nadkreślenie(Wpisz swój tekst)</u>
                </div>

                <div id="trzy">
                    <h1>Nagłówek poziomu 1. Jest podkreślony (Moj tekst)</h1>
                    <ol>
                        <li id="li1">Punkt pierwszy moj tekst</li>
                        <li id="li2">Punkt drugi moj tekst</li>
                        <li id="li3">Punkt trzeci moj tekst</li>
                    </ol>
                </div>
            </body>
            </html>
        </textarea>

        <h1>Kod CSS: </h1>
            <textarea cols="70" rows="52">
                #jeden{
                background-color: #FFFDD0;
                width: 40%;
                height: 100%;
                }
                p{
                    color: orange;
                    font-size: 20pt;
                    font-family: arial;
                }
                #dwa{
                    background-color: #ff00ff;
                    width: 15%;
                    height: 80%;
                }
                i{
                    color: green;
                    font-size: 20pt;
                    text-decoration: double;
                }
                strike{
                    color: red;
                    font-size: 20pt;
                }
                u{
                    color: purple;
                    font-size: 20pt;
                    text-decoration: overline;
                }
                #trzy{
                    background-color: #C0d727;
                    width: 30%;
                    height: 100%;
                }
                h1{
                    color: blue;
                    font-size: 30pt;
                    text-decoration: underline;
                }
                #li1{
                    color: blue;
                    font-size: 25pt;
                }
                #li2{
                    color: red;
                    font-size: 20pt;
                }
                #li3{
                    color: gray;
                    font-size: 15pt;
                }
            </textarea>
</body>
</html>
